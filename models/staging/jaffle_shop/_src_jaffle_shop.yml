sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A clone of a Prostgress application database.
    tables:
      - name: customers
        description: Raw customers data. 
        columns:
          - name: id
            description: Primary Key for customers data
            data_tests:
              - unique
              - not_null
              
        config:
          freshness: null
      - name: orders
        description: Raw orders data.
        columns:
          - name: id
            description: Primary Key for orders table.
            data_tests:
              - unique
              - not_null
              
        config:
          freshness:
            warn_after:
              count: 2
              period: day
            error_after:
              count: 9
              period: day
          loaded_at_field: _etl_loaded_at
        